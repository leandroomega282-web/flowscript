<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#07090f"/>
            <stop offset="50%" stop-color="#0f1420"/>
            <stop offset="100%" stop-color="#1a1230"/>
        </linearGradient>
        <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#5b9eff"/>
            <stop offset="100%" stop-color="#a06bff"/>
        </linearGradient>
        <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#74b0ff"/>
            <stop offset="100%" stop-color="#c89aff"/>
        </linearGradient>
        <radialGradient id="glow" cx="50%" cy="50%" r="50%">
            <stop offset="0%" stop-color="#5b9eff" stop-opacity="0.25"/>
            <stop offset="100%" stop-color="#5b9eff" stop-opacity="0"/>
        </radialGradient>
    </defs>

    <rect width="1200" height="630" fill="url(#bg)"/>

    <!-- Glow ambiente -->
    <ellipse cx="600" cy="50" rx="700" ry="300" fill="url(#glow)"/>

    <!-- Logo (3 cards empilhados em diagonal) -->
    <g transform="translate(120, 195)">
        <rect width="180" height="180" rx="34" fill="url(#logoGrad)"/>
        <rect x="48" y="100" width="100" height="100" rx="20" fill="white" opacity="0.35"/>
        <rect x="64" y="80"  width="100" height="100" rx="20" fill="white" opacity="0.65"/>
        <rect x="80" y="60"  width="100" height="100" rx="20" fill="white"/>
    </g>

    <!-- Título -->
    <text x="360" y="290" font-family="Inter, sans-serif" font-size="100" font-weight="800" fill="url(#textGrad)" letter-spacing="-3">FlowScript</text>

    <!-- Subtítulo -->
    <text x="360" y="345" font-family="Inter, sans-serif" font-size="32" font-weight="500" fill="#a4adbe">Gerador automático de scripts</text>

    <!-- Features -->
    <g font-family="Inter, sans-serif" font-size="22" font-weight="500" fill="#e8ecf3">
        <g transform="translate(360, 420)">
            <rect width="220" height="50" rx="10" fill="#131a28" stroke="#232c40"/>
            <text x="20" y="32">⚡  28 tarefas</text>
        </g>
        <g transform="translate(595, 420)">
            <rect width="270" height="50" rx="10" fill="#131a28" stroke="#232c40"/>
            <text x="20" y="32">🖥  PowerShell / Bash / Python</text>
        </g>
        <g transform="translate(880, 420)">
            <rect width="220" height="50" rx="10" fill="#131a28" stroke="#232c40"/>
            <text x="20" y="32">📦  183 programas</text>
        </g>
    </g>

    <!-- Badge URL -->
    <text x="360" y="540" font-family="JetBrains Mono, monospace" font-size="20" fill="#6a7488">leandroomega282-web.github.io/flowscript</text>
</svg>
